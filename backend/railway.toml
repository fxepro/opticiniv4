# Railway deployment config for Django backend
# Set Root Directory to "opticiniv4/backend" in Railway service Settings (monorepo)

[build]
builder = "nixpacks"

[deploy]
# set -eu: if any migrate step fails, do not start Gunicorn (avoids live 500s on schema mismatch).
startCommand = "/bin/sh -c \"set -eu; python manage.py migrate core 0025 --noinput; python manage.py migrate core 0026 --fake --noinput; python manage.py migrate --noinput; exec gunicorn core.wsgi:application --bind 0.0.0.0:${PORT:-8080}\""
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
