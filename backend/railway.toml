# Railway deployment config for Django backend
# Set Root Directory to "opticiniv4/backend" in Railway service Settings (monorepo)

[build]
builder = "nixpacks"

[deploy]
startCommand = "gunicorn core.wsgi:application --bind 0.0.0.0:$PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
