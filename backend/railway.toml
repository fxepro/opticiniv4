# Railway deployment config for Django backend
# Set Root Directory to "opticiniv4/backend" in Railway service Settings (monorepo)

[build]
builder = "nixpacks"

[deploy]
startCommand = "/bin/sh -c \"python manage.py migrate core 0025 --noinput; python manage.py migrate core 0026 --fake --noinput; python manage.py migrate --noinput; gunicorn core.wsgi:application --bind 0.0.0.0:${PORT:-8080}\""
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
