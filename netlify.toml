[build]
  base    = "studio"
  command = "npm run build"
  # Publish directory: leave unset – @netlify/plugin-nextjs handles deployment

[build.environment]
  NODE_VERSION = "20"
  # Baked into the client bundle at build time — public blog + API calls hit Railway.
  NEXT_PUBLIC_API_BASE_URL = "https://opticiniv4-backend-opticini-dev.up.railway.app"
  NEXT_PUBLIC_APP_URL = "https://opticini.com"

[[plugins]]
  package = "@netlify/plugin-nextjs"